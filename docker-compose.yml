services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: codebase_intel
      POSTGRES_USER: ${DB_USER:-codebase}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/storage/migrations/001_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-codebase} -d codebase_intel"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: rq worker indexing --url ${REDIS_URL:-redis://redis:6379}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run src/ui/dashboard.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      - API_URL=http://app:8000
    ports:
      - "8501:8501"
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
